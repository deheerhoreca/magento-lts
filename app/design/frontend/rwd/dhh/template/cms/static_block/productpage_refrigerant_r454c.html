<strong>Koelmiddel R454C</strong> is een nieuw, milieuvriendelijk en toekomstbestendig koelmiddel (refrigerant) met een Global Warming Potential (GWP) dat tot 14 keer lager is dan het huidige koelmiddel - het voldoet dus al aan de strengste EU-eisen.
