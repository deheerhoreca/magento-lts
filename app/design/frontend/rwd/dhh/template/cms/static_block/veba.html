<h3>VEBA Evenementenmeubilair</h3>
<p>Evenementenmeubels van VEBA. VEBA produceert, importeert en exporteert horeca- en evenementen meubilair voor de professionele markt in heel Europa. Uitstekend geschikt voor bruiloften, congressen, verhuur, feesten en andere gelegenheden met grote groepen.</p>
