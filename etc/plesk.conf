########################################################### Additional directives for HTTP ##########################################################


#
# KeepAlive: Whether or not to allow persistent connections (more than
# one request per connection). Set to "Off" to deactivate.
#
KeepAlive On

#
# MaxKeepAliveRequests: The maximum number of requests to allow
# during a persistent connection. Set to 0 to allow an unlimited amount.
# We recommend you leave this number high, for maximum performance.
#
MaxKeepAliveRequests 500

#
# KeepAliveTimeout: Number of seconds to wait for the next request from the
# same client on the same connection.
#
KeepAliveTimeout 300

# Prevent "File name too long: ... Cannot map GET ..." error
# https://stackoverflow.com/questions/51111251/how-to-set-the-value-of-limitrequestline-on-plesk-onyx
LimitRequestLine 16380
LimitRequestFieldSize 16380


########################################################## Additional directives for HTTPS ##########################################################


#
# KeepAlive: Whether or not to allow persistent connections (more than
# one request per connection). Set to "Off" to deactivate.
#
KeepAlive On

#
# MaxKeepAliveRequests: The maximum number of requests to allow
# during a persistent connection. Set to 0 to allow an unlimited amount.
# We recommend you leave this number high, for maximum performance.
#
MaxKeepAliveRequests 500

#
# KeepAliveTimeout: Number of seconds to wait for the next request from the
# same client on the same connection.
#
KeepAliveTimeout 300

# LogLevel alert rewrite:debug

# https://talk.plesk.com/threads/how-can-i-activate-php-fpm-status-page.353352/
# https://support.plesk.com/hc/en-us/articles/13303705093783-How-to-configure-the-PHP-FPM-plugin-of-360-Monitoring-on-a-Plesk-server
<LocationMatch "/fpm-status">
	ProxyPass unix:///var/www/vhosts/system/chefstore.nl/php-fpm.sock|fcgi://127.0.0.1:9000
</LocationMatch>

# Prevent "File name too long: ... Cannot map GET ..." errors
# https://stackoverflow.com/questions/51111251/how-to-set-the-value-of-limitrequestline-on-plesk-onyx
LimitRequestLine 16380
LimitRequestFieldSize 16380


############################################################ ADDITIONAL NGINX DIRECTIVES ############################################################


# https://stackoverflow.com/questions/23844761/upstream-sent-too-big-header-while-reading-response-header-from-upstream
fastcgi_buffers         16  16k;
fastcgi_buffer_size         32k;
proxy_buffer_size          128k;
proxy_buffers            4 256k;
proxy_busy_buffers_size    256k;

# Cache information about FDs, frequently accessed files
# See: https://serverfault.com/questions/547421/pread-read-only-xxxx-of-yyyy
aio                      on; # linux kernel > 2.6.22
open_file_cache          max=10000 inactive=120s; # removed from the cache if it has not been accessed during `inactive` time
open_file_cache_valid    120s; # Sets a time after which open_file_cache elements should be validated.
open_file_cache_min_uses 2; # Sets the minimum number of file accesses during the period configured by the inactive parameter
open_file_cache_errors   off; # Enables or disables caching of file lookup errors by open_file_cache.
open_log_file_cache      max=20000 inactive=30s min_uses=2;

# https://serverspace.io/support/help/nginx-web-server-security-resources-limits/
# multi_accept                  on;
# mutex_accept_delay    200ms;
# use                                  epoll;

# https://talk.plesk.com/threads/how-can-i-activate-php-fpm-status-page.353352/
# https://support.plesk.com/hc/en-us/articles/13303705093783-How-to-configure-the-PHP-FPM-plugin-of-360-Monitoring-on-a-Plesk-server
location ~ ^/(status|ping|status_phpfpm)$ {
	fastcgi_split_path_info ^((?U).+\\.php)(/?.+)$;
	fastcgi_param PATH_INFO $fastcgi_path_info;
	fastcgi_pass "unix:///var/www/vhosts/system/chefstore.nl/php-fpm.sock";
	# fastcgi_pass "unix:///var/www/vhosts/system/dev.chefstore.nl/php-fpm.sock";
	include /etc/nginx/fastcgi.conf;
}
