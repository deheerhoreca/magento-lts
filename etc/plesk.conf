# --- 1. Request Header & Body Limits (Fix for Employee 520 Errors) ---
# Handle incoming large cookies/headers from clients (admin cookie bloat)
client_header_buffer_size      16k;
large_client_header_buffers    4 32k;
# @see https://www.netguru.com/blog/nginx-tutorial-performance
client_body_buffer_size        80k;
keepalive_requests             100000;

# --- 2. Proxy & FastCGI Buffers (Fix for Large Backend Responses) ---
# @see https://stackoverflow.com/questions/23844761/upstream-sent-too-big-header-while-reading-response-header-from-upstream
proxy_buffer_size              128k;
proxy_buffers                  4 256k;
proxy_busy_buffers_size        256k;
fastcgi_buffer_size            32k;
fastcgi_buffers                16 16k;

# --- 3. Timeouts (Aligned with PHP-FPM 600s / Apache 660s) ---
proxy_connect_timeout          660s;
proxy_read_timeout             660s;
proxy_send_timeout             660s;

# --- 4. File I/O & FD Caching (OpenMage Performance) ---
# @see: https://serverfault.com/questions/547421/pread-read-only-xxxx-of-yyyy
aio                            on;
tcp_nopush                     on;
tcp_nodelay                    on;
open_file_cache                max=10000 inactive=120s;
open_file_cache_valid          120s;
open_file_cache_min_uses       2;
open_file_cache_errors         off;
open_log_file_cache            max=20000 inactive=30s min_uses=2;

# --- 5. Brotli Compression (With Static Offloading for .br files) ---
brotli                         on;
brotli_static                  on;
brotli_comp_level              1;
brotli_min_length              128;
brotli_types                   text/plain text/css text/javascript text/xml application/javascript application/json application/xml application/xml+rss application/xhtml+xml application/atom+xml application/rss+xml application/x-javascript application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject font/ttf font/otf font/opentype font/woff font/woff2 image/svg+xml image/x-icon;

# --- 6. Gzip Compression (With Static Offloading for .gz files) ---
gzip                           on;
gzip_static                    on;
gzip_vary                      on;
gzip_proxied                   any;
gzip_comp_level                1;
gzip_min_length                128;
gzip_buffers                   16 8k;
gzip_http_version              1.1;
gzip_types                     text/plain text/xml text/css application/x-javascript application/javascript application/ecmascript text/javascript application/json application/rss+xml application/xml image/svg+xml application/x-font-ttf application/vnd.ms-fontobject image/x-icon;
gzip_disable                   "MSIE [1-6].(?!.*SV1)";

# --- 7. Specialized Locations ---
# PHP-FPM Status & Ping
# @see https://talk.plesk.com/threads/how-can-i-activate-php-fpm-status-page.353352/
# @see https://support.plesk.com/hc/en-us/articles/13303705093783-How-to-configure-the-PHP-FPM-plugin-of-360-Monitoring-on-a-Plesk-server
location ~ ^/(status|ping|status_phpfpm)$ {
    fastcgi_split_path_info ^((?U).+\\.php)(/?.+)$;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_pass "unix:///var/www/vhosts/system/chefstore.nl/php-fpm.sock";
    include /etc/nginx/fastcgi.conf;
}
