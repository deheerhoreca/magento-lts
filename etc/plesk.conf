########################################################### Additional directives for HTTP ##########################################################


# mod_rewriteip, @url https://developers.cloudflare.com/support/troubleshooting/restoring-visitor-ips/restoring-original-visitor-ips/#mod_remoteip
# RemoteIPHeader CF-Connecting-IP
# RemoteIPHeader X-FORWARDED-FOR
# LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined
# CloudFlareRemoteIPHeader CF-Connecting-IP

# "+FollowSymlinks -SymLinksIfOwnerMatch" are necessary to allow symlinks for ./media/
# Also, the apache user must have +rx permissions on the target of the symlink, and all parent dirs.
<Directory /var/www/vhosts/chefstore.nl/workspace/openmage>
    # AllowOverride None
    # Include /var/www/vhosts/chefstore.nl/workspace/openmage/_htaccess
    Options +FollowSymlinks -SymLinksIfOwnerMatch
</Directory>

# KeepAlive: Whether or not to allow persistent connections (more than
# one request per connection). OFF for HTTP: There should be no traffic on HTTP.
KeepAlive Off

# - Prevent "File name too long: ... Cannot map GET ..." errors
#   @see https://stackoverflow.com/questions/51111251/how-to-set-the-value-of-limitrequestline-on-plesk-onyx
# - Important config to prevent "Cookie too large" errors! 32 kB minimal
LimitRequestLine 32760
LimitRequestFieldSize 32760

# https://www.plesk.com/kb/support/does-plesk-support-brotli-compression-for-apache-or-nginx-web-server/
SetEnv no-gzip 1

# 2026-02-18 gemini session on "bogus" error:
# -----------------------------------------------------------------------------------------------
<FilesMatch \.php$>
    SetHandler "proxy:unix:///var/www/vhosts/system/chefstore.nl/php-fpm.sock|fcgi://localhost"
</FilesMatch>

# Global buffer setting for proxying -- prevents "bogus" error during long requests (admin) when the default
# buffer size of 8192 bytes is too small for the response headers from PHP-FPM.
ProxyReceiveBufferSize 65536

<Proxy "fcgi://localhost">
    ProxySet disablereuse=On
    ProxySet timeout=660
    # Increase the internal flush/buffer for the proxy worker
    ProxySet flushpackets=on
    ProxySet flushwait=100
</Proxy>

<LocationMatch "/fpm-status-3bier">
    ProxyPass unix:///var/www/vhosts/system/chefstore.nl/php-fpm.sock|fcgi://127.0.0.1:9000
</LocationMatch>
# -----------------------------------------------------------------------------------------------


