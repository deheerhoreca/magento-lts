log_errors                                                = On
max_execution_time                                        = 7200
memory_limit                                              = 4g
error_reporting                                           = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log                                                 = php_error.log
open_basedir                                              = 
expose_php                                                = Off

; This is only for CLI, so we display errors:
display_errors                                            = On
display_startup_errors                                    = On

; https://haydenjames.io/set-monitor-phps-realpath_cache_size-correctly/
realpath_cache_size                                       = 1M
realpath_cache_ttl                                        = 300

; Sometimes we have big stuff. Also needs to be added to open_basedir
upload_tmp_dir                                            = /tmp_intel
sys_temp_dir                                              = /tmp_intel

[opcache]
; https://github.com/loekvangool/deheerhoreca-operations/edit/master/magento/magento1_opcache.md
; https://gist.github.com/rohankhudedev/1a9c0a3c7fb375f295f9fc11aeb116fe
; https://www.php.net/manual/en/opcache.configuration.php
; opcache.max_accelerated_files: find . -iname \*.php | wc -l 19184 -- But real-life is lower
opcache.enable                                            = On
opcache.enable_cli                                        = On
opcache.error_log                                         = php_opcache_error.log
opcache.log_verbosity_level                               = 1
opcache.memory_consumption                                = 128
opcache.interned_strings_buffer                           = 32
opcache.max_accelerated_files                             = 16229
opcache.validate_timestamps                               = Off
opcache.revalidate_freq                                   = 0
opcache.validate_root                                     = Off
opcache.file_cache_only                                   = On
opcache.file_cache_consistency_checks                     = Off
opcache.file_update_protection                            = 2
opcache.validate_permission                               = On

; JIT creates segfaults etc. and is of little benefit < PHP 8.3
; opcache.jit                                               = tracing ; From PHP 8.4
opcache.jit                                               = Off
opcache.jit_buffer_size                                   = 0

[mysqlnd]
mysqlnd.collect_statistics                                = Off
mysqlnd.collect_memory_statistics                         = Off

[elastic-apm]
elastic_apm.enabled                                       = On
elastic_apm.server_url                                    = https://rum.chefstore.nl:8200
elastic_apm.log_level_syslog                              = ERROR
elastic_apm.log_level_stderr                              = ERROR
elastic_apm.log_level                                     = ERROR
elastic_apm.service_name                                  = openmage-php
elastic_apm.server_timeout                                = 5s
elastic_apm.transaction_max_spans                         = 50
elastic_apm.verify_server_cert                            = Off
elastic_apm.span_compression_enabled                      = true
elastic_apm.profiling_inferred_spans_enabled              = false
elastic_apm.stack_trace_limit                             = 25
elastic_apm.capture_errors                                = true
elastic_apm.breakdown_metrics                             = false
elastic_apm.disable_instrumentations                      = "DB"

; If APCu is enabled, enable it for CLI as well (for cronjobs)
apc.enable_cli                                            = On
